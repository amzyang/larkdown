# Dependabot 自动依赖更新配置
# 文档：https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Go 模块依赖
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "go"
    groups:
      # 把 minor/patch 升级合并成一个 PR，减少噪音
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # chyroc/lark 通过 replace 指向 amzyang/lark fork，按 CLAUDE.md
      # 「同步 Fork lark SDK」流程手动管理伪版本，Dependabot 无法正确处理。
      - dependency-name: "github.com/chyroc/lark"

  # GitHub Actions 工作流依赖
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
